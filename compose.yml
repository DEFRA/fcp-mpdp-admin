services:
  fcp-mpdp-admin:
    profiles:
      - app
    build:
      context: .
      target: development
    volumes:
      - ./src:/home/node/src
      - ./package.json:/home/node/package.json
      - ./vite.config.js:/home/node/vite.config.js
    env_file:
      - .env
    environment:
      # Override values that differ inside Docker (take precedence over env_file)
      MPDP_BACKEND_ENDPOINT: http://fcp-mpdp-backend:3001
      REDIS_HOST: redis
    depends_on:
      redis:
        condition: service_healthy

  redis:
    image: redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
